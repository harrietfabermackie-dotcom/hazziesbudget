<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#ff9ecf" />
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" href="icons/icon.svg" type="image/svg+xml" />
  <title>Hazzie Asia Budget</title>

  <style>
    :root{
      --pinkA: #ff9ecf;
      --pinkB: #ffd1e6;

      --yellowA: #ffdca8;
      --yellowB: #fff0c9;

      --cream: #fffaf3;
      --white: #ffffff;

      --ink: #3a2f38;
      --muted: rgba(58,47,56,0.68);

      --shadowSoft: 0 18px 50px rgba(58,47,56,0.12);
      --shadowCard: 0 14px 34px rgba(58,47,56,0.10);

      --radius: 28px;
      --pill: 999px;
    }

    *{ box-sizing: border-box; }
    html, body{ height: 100%; }

    body{
      margin: 0;
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;
      color: var(--ink);
      background:
        radial-gradient(900px 700px at 18% 10%, rgba(255,158,207,0.55), transparent 56%),
        radial-gradient(900px 700px at 85% 18%, rgba(255,220,168,0.70), transparent 58%),
        linear-gradient(180deg, var(--yellowB), var(--cream));
      display: grid;
      place-items: start center;
      padding: 16px;
    }

    .wrap{
      width: min(520px, 100%);
      display: grid;
      gap: 12px;
      padding-bottom: 24px;
    }

    .top{
      border-radius: var(--radius);
      padding: 14px;
      box-shadow: var(--shadowSoft);
      background:
        linear-gradient(135deg, rgba(255,158,207,0.65), rgba(255,220,168,0.70));
      border: 1px solid rgba(255,255,255,0.55);
      backdrop-filter: blur(8px);
    }

    .brandRow{
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 12px;
    }

    .brandLeft{
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }

    .iconBadge{
      width: 52px;
      height: 52px;
      border-radius: 20px;
      background: rgba(255,255,255,0.75);
      border: 1px solid rgba(255,255,255,0.70);
      box-shadow: var(--shadowCard);
      display: grid;
      place-items: center;
      overflow: hidden;
      flex: 0 0 auto;
    }

    .iconBadge svg{ width: 40px; height: 40px; }

    h1{
      margin: 0;
      font-size: 18px;
      letter-spacing: 0.2px;
      line-height: 1.1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 100%;
    }

    .sub{
      margin: 6px 0 0 0;
      font-size: 12px;
      color: var(--muted);
    }

    .pill{
      flex: 0 0 auto;
      font-size: 12px;
      font-weight: 900;
      padding: 10px 12px;
      border-radius: var(--pill);
      background: rgba(255,255,255,0.70);
      border: 1px solid rgba(255,255,255,0.70);
      box-shadow: var(--shadowCard);
      color: rgba(58,47,56,0.85);
      white-space: nowrap;
    }

    .stats{
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .stat{
      border-radius: 22px;
      padding: 12px;
      background: rgba(255,255,255,0.70);
      border: 1px solid rgba(255,255,255,0.70);
      box-shadow: var(--shadowCard);
      display: grid;
      gap: 6px;
    }

    .label{
      font-size: 12px;
      font-weight: 900;
      color: rgba(58,47,56,0.72);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .dot{
      width: 10px;
      height: 10px;
      border-radius: 999px;
      background: rgba(255,158,207,0.95);
      box-shadow: 0 0 0 4px rgba(255,158,207,0.18);
    }

    .dot.y{
      background: rgba(255,220,168,0.95);
      box-shadow: 0 0 0 4px rgba(255,220,168,0.22);
    }

    .value{
      font-size: 20px;
      font-weight: 1000;
      letter-spacing: 0.2px;
    }

    .card{
      border-radius: var(--radius);
      padding: 14px;
      box-shadow: var(--shadowSoft);
      background: rgba(255,255,255,0.72);
      border: 1px solid rgba(255,255,255,0.70);
      backdrop-filter: blur(8px);
      display: grid;
      gap: 12px;
    }

    .row{
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      align-items: center;
    }

    input, button{ font: inherit; }

    .input{
      width: 100%;
      padding: 14px 14px;
      border-radius: var(--pill);
      border: 1px solid rgba(255,255,255,0.85);
      outline: none;
      background: rgba(255,250,243,0.88);
      color: var(--ink);
      font-weight: 900;
      box-shadow: 0 10px 24px rgba(58,47,56,0.08);
    }

    .input:focus{
      box-shadow:
        0 10px 24px rgba(58,47,56,0.08),
        0 0 0 4px rgba(255,158,207,0.20);
    }

    .input::placeholder{
      color: rgba(58,47,56,0.55);
      font-weight: 800;
    }

    .btn{
      border: 0;
      padding: 14px 16px;
      border-radius: var(--pill);
      background: linear-gradient(180deg, rgba(255,158,207,0.95), rgba(255,158,207,0.78));
      color: rgba(58,47,56,0.95);
      font-weight: 1000;
      cursor: pointer;
      box-shadow: 0 14px 30px rgba(255,158,207,0.24);
      transition: transform 0.06s ease;
      white-space: nowrap;
    }

    .btn:active{ transform: translateY(1px); }

    .btn.secondary{
      background: linear-gradient(180deg, rgba(255,220,168,0.92), rgba(255,220,168,0.72));
      box-shadow: 0 14px 30px rgba(255,220,168,0.22);
    }

    .quick{
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .chip{
      border: 0;
      padding: 10px 12px;
      border-radius: var(--pill);
      cursor: pointer;
      font-weight: 1000;
      color: rgba(58,47,56,0.95);
      background: rgba(255,255,255,0.72);
      border: 1px solid rgba(255,255,255,0.75);
      box-shadow: 0 10px 22px rgba(58,47,56,0.08);
    }

    .chip:active{ transform: translateY(1px); }

    .split{
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
    }

    .muted{
      font-size: 12px;
      font-weight: 900;
      color: rgba(58,47,56,0.62);
    }

    .list{
      display: grid;
      gap: 10px;
    }

    .item{
      border-radius: 22px;
      padding: 12px;
      background: rgba(255,250,243,0.88);
      border: 1px solid rgba(255,255,255,0.80);
      box-shadow: 0 10px 24px rgba(58,47,56,0.08);
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      align-items: center;
    }

    .amt{
      font-weight: 1000;
    }

    .time{
      font-size: 12px;
      font-weight: 900;
      color: rgba(58,47,56,0.58);
      margin-top: 4px;
    }

    .trash{
      border: 0;
      padding: 10px 12px;
      border-radius: 18px;
      cursor: pointer;
      font-weight: 1000;
      color: rgba(58,47,56,0.92);
      background: rgba(255,158,207,0.30);
      box-shadow: 0 10px 22px rgba(255,158,207,0.18);
    }

    .footer{
      text-align: center;
      font-size: 12px;
      font-weight: 900;
      color: rgba(58,47,56,0.55);
      padding-top: 2px;
    }
  </style>
</head>

<body>
  <div class="wrap">

    <div class="top">
      <div class="brandRow">
        <div class="brandLeft">
          <div class="iconBadge" aria-hidden="true">
            <!-- Matches your icon style -->
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
              <defs>
                <linearGradient id="bgMini" x1="0" y1="0" x2="1" y2="1">
                  <stop offset="0%" stop-color="#ff9ecf"/>
                  <stop offset="100%" stop-color="#ffdca8"/>
                </linearGradient>
                <linearGradient id="coinMini" x1="0" y1="0" x2="0" y2="1">
                  <stop offset="0%" stop-color="#ffffff"/>
                  <stop offset="100%" stop-color="#ffeebf"/>
                </linearGradient>
              </defs>
              <rect width="256" height="256" rx="64" fill="url(#bgMini)"/>
              <circle cx="128" cy="128" r="70" fill="url(#coinMini)" opacity="0.95"/>
              <circle cx="128" cy="128" r="34" fill="#ffffff" opacity="0.85"/>
            </svg>
          </div>
          <div style="min-width:0;">
            <h1>Hazzie Asia Budget</h1>
            <p class="sub" id="dateLine">Today</p>
          </div>
        </div>

        <div class="pill" id="vnDatePill">...</div>
      </div>

      <div class="stats">
        <div class="stat">
          <div class="label"><span class="dot y"></span><span>Spent today</span></div>
          <div class="value" id="spentToday">0</div>
        </div>
        <div class="stat">
          <div class="label"><span class="dot"></span><span>Remaining</span></div>
          <div class="value" id="remaining">0</div>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="row">
        <input class="input" id="amountInput" inputmode="numeric" placeholder="Enter spend, VND" />
        <button class="btn" id="addBtn">Add</button>
      </div>

      <div class="quick" aria-label="Quick add">
        <button class="chip" data-add="20000">+20k</button>
        <button class="chip" data-add="50000">+50k</button>
        <button class="chip" data-add="100000">+100k</button>
        <button class="chip" data-add="200000">+200k</button>
        <button class="chip" data-add="500000">+500k</button>
      </div>

      <div class="split">
        <div class="muted" id="countLine">0 spends today</div>
        <button class="btn secondary" id="clearBtn">Clear today</button>
      </div>

      <div class="list" id="list"></div>
    </div>

    <div class="footer">Daily budget is 437000 VND, resets at midnight Vietnam time.</div>
  </div>

<script>
(() => {
  const TZ = 'Asia/Ho_Chi_Minh';
  const DAILY_BUDGET_VND = 437000;

  const $ = (id) => document.getElementById(id);

  const els = {
    vnDatePill: $('vnDatePill'),
    dateLine: $('dateLine'),
    spentToday: $('spentToday'),
    remaining: $('remaining'),
    amountInput: $('amountInput'),
    addBtn: $('addBtn'),
    clearBtn: $('clearBtn'),
    list: $('list'),
    countLine: $('countLine'),
  };

  const storageKey = 'hazzie_budget_v3';

  function formatVNDateParts(now = new Date()){
    const formatter = new Intl.DateTimeFormat('en-GB', {
      timeZone: TZ,
      year: 'numeric',
      month: '2-digit',
      day: '2-digit'
    });
    const parts = formatter.formatToParts(now);
    const map = Object.fromEntries(parts.filter(p => p.type !== 'literal').map(p => [p.type, p.value]));
    const key = `${map.year}-${map.month}-${map.day}`;
    const pretty = `${map.day}/${map.month}/${map.year}`;
    return { key, pretty };
  }

  function formatTimeVN(ts){
    return new Intl.DateTimeFormat('en-GB', {
      timeZone: TZ,
      hour: '2-digit',
      minute: '2-digit'
    }).format(new Date(ts));
  }

  function formatVND(n){
    const x = Math.max(0, Math.round(Number(n || 0)));
    return x.toLocaleString('en-GB') + ' VND';
  }

  function parseVND(input){
    const cleaned = String(input || '').replace(/[^\d]/g, '');
    if(!cleaned) return 0;
    return Math.max(0, Number(cleaned));
  }

  function loadState(){
    try{
      const raw = localStorage.getItem(storageKey);
      if(!raw) return null;
      return JSON.parse(raw);
    }catch{
      return null;
    }
  }

  function saveState(state){
    localStorage.setItem(storageKey, JSON.stringify(state));
  }

  function freshStateForToday(){
    const { key } = formatVNDateParts();
    return { vnDateKey: key, entries: [] };
  }

  function ensureToday(state){
    const { key } = formatVNDateParts();
    if(!state) return freshStateForToday();
    if(state.vnDateKey !== key){
      const next = freshStateForToday();
      saveState(next);
      return next;
    }
    return state;
  }

  function spentTotal(entries){
    return entries.reduce((sum, e) => sum + (Number(e.amountVND) || 0), 0);
  }

  function render(state){
    const { pretty } = formatVNDateParts();
    els.vnDatePill.textContent = `VN ${pretty}`;
    els.dateLine.textContent = `Today, ${pretty}, Vietnam time`;

    const spent = spentTotal(state.entries);
    const remaining = Math.max(0, DAILY_BUDGET_VND - spent);

    els.spentToday.textContent = formatVND(spent);
    els.remaining.textContent = formatVND(remaining);
    els.countLine.textContent = `${state.entries.length} spend${state.entries.length === 1 ? '' : 's'} today`;

    els.list.innerHTML = '';
    if(state.entries.length === 0){
      const div = document.createElement('div');
      div.className = 'item';
      div.innerHTML = `
        <div>
          <div class="amt">No spends yet</div>
          <div class="time">You are calm, you are sorted.</div>
        </div>
        <div></div>
      `;
      els.list.appendChild(div);
      return;
    }

    const sorted = [...state.entries].sort((a,b) => b.ts - a.ts);
    for(const e of sorted){
      const div = document.createElement('div');
      div.className = 'item';
      div.innerHTML = `
        <div>
          <div class="amt">${formatVND(e.amountVND)}</div>
          <div class="time">${formatTimeVN(e.ts)}</div>
        </div>
        <button class="trash" data-id="${e.id}" title="Delete">X</button>
      `;
      els.list.appendChild(div);
    }
  }

  function makeId(){
    return Math.random().toString(16).slice(2) + Date.now().toString(16);
  }

  let state = ensureToday(loadState());
  saveState(state);
  render(state);

  function addSpend(amountVND){
    const amt = Math.round(Number(amountVND || 0));
    if(!amt || amt <= 0) return;

    state = ensureToday(loadState());
    state.entries.push({ id: makeId(), amountVND: amt, ts: Date.now() });
    saveState(state);
    render(state);
  }

  els.addBtn.addEventListener('click', () => {
    const amt = parseVND(els.amountInput.value);
    els.amountInput.value = '';
    addSpend(amt);
    els.amountInput.focus();
  });

  els.amountInput.addEventListener('keydown', (e) => {
    if(e.key === 'Enter'){
      e.preventDefault();
      els.addBtn.click();
    }
  });

  document.querySelectorAll('.chip').forEach(btn => {
    btn.addEventListener('click', () => {
      const add = Number(btn.getAttribute('data-add') || 0);
      addSpend(add);
    });
  });

  els.clearBtn.addEventListener('click', () => {
    state = ensureToday(loadState());
    state.entries = [];
    saveState(state);
    render(state);
  });

  els.list.addEventListener('click', (e) => {
    const t = e.target;
    if(!(t instanceof HTMLElement)) return;
    if(t.matches('button.trash')){
      const id = t.getAttribute('data-id');
      state = ensureToday(loadState());
      state.entries = state.entries.filter(x => x.id !== id);
      saveState(state);
      render(state);
    }
  });

  if('serviceWorker' in navigator){
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('./service-worker.js').catch(() => {});
    });
  }

  setInterval(() => {
    const current = ensureToday(loadState());
    if(current.vnDateKey !== state.vnDateKey){
      state = current;
      render(state);
    }
  }, 20000);
})();
</script>
</body>
</html>
